services:
  postgres:
    image: postgres:16
    container_name: karma-lending-postgres
    environment:
      POSTGRES_DB: karma_lending
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - karma-lending-postgres:/var/lib/postgresql/data

volumes:
  karma-lending-postgres:
